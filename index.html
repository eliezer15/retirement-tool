<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirement Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- App Header -->
  <div id="app-header">
    <div class="brand">
      <div class="brand-icon">💰</div>
      <div>
        <div class="brand-name">Retirement Visualizer</div>
        <div class="brand-sub">2026 MFJ Tax Model</div>
      </div>
    </div>
    <div class="header-actions" id="header-actions"></div>
  </div>

  <div id="banner"></div>

  <!-- Controls row 1: Global settings (full width) -->
  <div class="card" id="ctrl-global"></div>

  <!-- Controls row 2: Balances | Withdrawal Order | Save/Load -->
  <div class="grid-3">
    <div class="card" id="ctrl-buckets"></div>
    <div class="card" id="ctrl-order"></div>
    <div class="card" id="ctrl-saveload"></div>
  </div>

  <!-- Controls row 3: Contribution Intervals | Spend Intervals -->
  <div class="grid-2">
    <div class="card" id="ctrl-contributions"></div>
    <div class="card" id="ctrl-spend"></div>
  </div>

  <!-- Summary strip -->
  <div class="summary-grid" id="summary-grid" style="margin-bottom:14px"></div>

  <!-- Charts -->
  <div class="card">
    <div class="chart-header">
      <div class="chart-title">Portfolio Balance by Age</div>
      <div class="chart-legend" id="legend-balance"></div>
    </div>
    <div class="chart-wrap"><canvas id="chart-balance"></canvas></div>
  </div>
  <div class="card">
    <div class="chart-header">
      <div class="chart-title">Annual Tax Breakdown</div>
      <div class="chart-legend" id="legend-tax"></div>
    </div>
    <div class="chart-wrap-sm"><canvas id="chart-tax"></canvas></div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="chart-title" style="margin-bottom:14px">Year-by-Year Detail</div>
    <div style="overflow-x:auto"><table id="detail-table"></table></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
